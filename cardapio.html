<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cardápio — BRLanches</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-brlanches navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand-logo" href="index.html">🇧🇷 BRLanches</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMenu">
      <ul class="navbar-nav gap-1 mt-2 mt-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="cardapio.html">Cardápio</a></li>
        <li class="nav-item">
          <a class="nav-link" href="carrinho.html">
            <i class="bi bi-cart3"></i> Carrinho
            <span class="badge-carrinho" id="badge-carrinho" style="display:none">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main>
  <div class="container py-5">
    <div class="text-center mb-4">
      <h1 class="section-title">Cardápio</h1>
      <p class="section-subtitle">Escolha o seu campeão favorito</p>
    </div>

    <div class="d-flex gap-2 justify-content-center flex-wrap mb-4">
      <button class="filtro-btn ativo" data-filtro="todos">Todos</button>
      <button class="filtro-btn" data-filtro="Lanches">🍔 Lanches</button>
      <button class="filtro-btn" data-filtro="Sucos">🥤 Sucos</button>
    </div>

    <div id="loading-wrap" class="loading-wrap">
      <div class="spinner-border text-success" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
      <p class="mt-2 text-muted">Buscando o cardápio...</p>
    </div>

    <div id="grid-produtos" class="row g-4" style="display:none"></div>

    <div id="vazio-msg" class="text-center py-5" style="display:none">
      <p class="text-muted fs-5">Nenhum item encontrado 😕</p>
    </div>
  </div>
</main>

<footer>
  <div class="footer-faixa">
    <div class="footer-faixa-verde"></div>
    <div class="footer-faixa-amarelo"></div>
    <div class="footer-faixa-azul"></div>
  </div>
  <div class="footer-corpo">
    &copy; 2025 BRLanches — Feito com paixão pela seleção 🇧🇷
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/carrinho.js"></script>
<script>
  let todosProdutos = []

  async function carregarProdutos() {
    const { data, error } = await supabaseClient
      .from('produtos')
      .select('*, categorias(nome)')
      .eq('disponivel', true)

    document.getElementById('loading-wrap').style.display = 'none'

    if (error || !data || data.length === 0) {
      document.getElementById('vazio-msg').style.display = 'block'
      return
    }

    todosProdutos = data
    renderizarCards(data)
    document.getElementById('grid-produtos').style.display = 'flex'
  }

  function formatarPreco(valor) {
    return 'R$ ' + parseFloat(valor).toFixed(2).replace('.', ',')
  }

  function renderizarCards(produtos) {
    const grid = document.getElementById('grid-produtos')
    grid.innerHTML = ''

    if (produtos.length === 0) {
      document.getElementById('vazio-msg').style.display = 'block'
      return
    }

    document.getElementById('vazio-msg').style.display = 'none'

    produtos.forEach(produto => {
      const categoria = produto.categorias?.nome || ''
      const badgeClass = categoria === 'Sucos' ? 'badge-sucos' : 'badge-lanches'
      const col = document.createElement('div')
      col.className = 'col-12 col-sm-6 col-md-4'
      col.dataset.categoria = categoria
      col.innerHTML = `
        <div class="card-produto">
          <div class="card-produto-body">
            <span class="badge-categoria ${badgeClass}">${categoria}</span>
            <div class="card-produto-nome">${produto.nome}</div>
            <p class="card-produto-desc">${produto.descricao || ''}</p>
            <div class="card-produto-preco">${formatarPreco(produto.preco)}</div>
            <button class="btn-primary-br w-100" onclick="handleAdicionar(${produto.id}, '${produto.nome.replace(/'/g, "\\'")}', ${produto.preco}, this)">
              <i class="bi bi-cart-plus me-1"></i> Adicionar ao Carrinho
            </button>
          </div>
        </div>
      `
      grid.appendChild(col)
    })
  }

  function handleAdicionar(id, nome, preco, btn) {
    adicionarAoCarrinho({ id, nome, preco })
    const original = btn.innerHTML
    btn.innerHTML = '<i class="bi bi-check-lg me-1"></i> Adicionado!'
    btn.disabled = true
    setTimeout(() => {
      btn.innerHTML = original
      btn.disabled = false
    }, 1200)
  }

  document.querySelectorAll('.filtro-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'))
      btn.classList.add('ativo')
      const filtro = btn.dataset.filtro
      const cols = document.querySelectorAll('#grid-produtos [data-categoria]')
      let visiveis = 0
      cols.forEach(col => {
        const mostrar = filtro === 'todos' || col.dataset.categoria === filtro
        col.style.display = mostrar ? '' : 'none'
        if (mostrar) visiveis++
      })
      document.getElementById('vazio-msg').style.display = visiveis === 0 ? 'block' : 'none'
    })
  })

  carregarProdutos()
</script>
</body>
</html>
