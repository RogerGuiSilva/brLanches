<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho — BRLanches</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-brlanches navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand-logo" href="index.html">BRLanches</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navMenu">
      <ul class="navbar-nav gap-1 mt-2 mt-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="cardapio.html">Cardápio</a></li>
        <li class="nav-item">
          <a class="nav-link" href="carrinho.html">
            <i class="bi bi-cart3"></i> Carrinho
            <span class="badge-carrinho" id="badge-carrinho" style="display:none">0</span>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main>
  <div class="container py-5">
    <h1 class="section-title mb-4">Seu Carrinho</h1>

    <div id="carrinho-vazio" class="carrinho-vazio" style="display:none">
      <span class="emoji">😢</span>
      <h3 style="font-family:'Bebas Neue',sans-serif; font-size:2rem; color:#555;">Seu carrinho está vazio</h3>
      <p class="text-muted mb-4">Nenhum item adicionado ainda. Que tal dar uma olhada no cardápio?</p>
      <a href="cardapio.html" class="btn-primary-br">Ver Cardápio</a>
    </div>

    <div id="carrinho-conteudo" style="display:none">
      <div class="bg-white rounded-3 shadow-sm p-3 p-md-4 mb-4">
        <div class="table-responsive">
          <table class="table tabela-carrinho mb-0">
            <thead>
              <tr>
                <th>Produto</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tabela-body"></tbody>
          </table>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
        <div class="total-linha">
          Total: <span id="total-geral">R$ 0,00</span>
        </div>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn-secondary-br" onclick="handleLimpar()">
            <i class="bi bi-trash3 me-1"></i> Limpar Carrinho
          </button>
          <a href="checkout.html" class="btn-primary-br">
            Finalizar Pedido <i class="bi bi-arrow-right ms-1"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-faixa">
    <div class="footer-faixa-verde"></div>
    <div class="footer-faixa-amarelo"></div>
    <div class="footer-faixa-azul"></div>
  </div>
  <div class="footer-corpo">
    &copy; 2026 BRLanches — Feito para honrar nossa grande Seleção
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/carrinho.js"></script>
<script>
  function formatarPreco(valor) {
    return 'R$ ' + parseFloat(valor).toFixed(2).replace('.', ',')
  }

  function renderizarCarrinho() {
    const carrinho = obterCarrinho()
    if (carrinho.length === 0) {
      document.getElementById('carrinho-vazio').style.display = 'block'
      document.getElementById('carrinho-conteudo').style.display = 'none'
      return
    }

    document.getElementById('carrinho-vazio').style.display = 'none'
    document.getElementById('carrinho-conteudo').style.display = 'block'

    const tbody = document.getElementById('tabela-body')
    tbody.innerHTML = ''
    let total = 0

    carrinho.forEach((item, index) => {
      const subtotal = item.preco * item.quantidade
      total += subtotal
      const tr = document.createElement('tr')
      tr.innerHTML = `
        <td><strong>${item.nome}</strong></td>
        <td>${formatarPreco(item.preco)}</td>
        <td>
          <div class="qtd-control">
            <button class="qtd-btn" onclick="alterarQtd(${index}, -1)">−</button>
            <span>${item.quantidade}</span>
            <button class="qtd-btn" onclick="alterarQtd(${index}, 1)">+</button>
          </div>
        </td>
        <td><strong>${formatarPreco(subtotal)}</strong></td>
        <td>
          <button class="btn-remover" onclick="removerItem(${index})" title="Remover">
            <i class="bi bi-x-lg"></i>
          </button>
        </td>
      `
      tbody.appendChild(tr)
    })

    document.getElementById('total-geral').textContent = formatarPreco(total)
    atualizarBadgeCarrinho()
  }

  function alterarQtd(index, delta) {
    const carrinho = obterCarrinho()
    carrinho[index].quantidade += delta
    if (carrinho[index].quantidade <= 0) {
      carrinho.splice(index, 1)
    }
    localStorage.setItem('brlanches_carrinho', JSON.stringify(carrinho))
    renderizarCarrinho()
  }

  function removerItem(index) {
    const carrinho = obterCarrinho()
    carrinho.splice(index, 1)
    localStorage.setItem('brlanches_carrinho', JSON.stringify(carrinho))
    renderizarCarrinho()
  }

  function handleLimpar() {
    if (confirm('Limpar todos os itens do carrinho?')) {
      limparCarrinho()
      renderizarCarrinho()
    }
  }

  renderizarCarrinho()
</script>
</body>
</html>
